name: CI

on: 
  pull_request:
  push:
    branches: [ "main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]
    
    services:
      postgres:
        image:  postgres:16
        env:
          POSTGRES_DB:  ina_zaoui_test
          POSTGRES_USER:  postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ina_zaoui_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      
    env:
      APP_ENV: test
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/ina_zaoui?serverVersion=16&charset=utf8"

    steps:
    # 1 Checkout
      - name: Checkout
        uses: actions/checkout@v4
    
    # 2 Setup PHP 8.4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          tools: composer:v2
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          coverage: none
    
    # 3 Cache Composer
      - name: Cache Composer
        uses: actions/cache@v4
        with: 
          path: |
            ~/.cache/composer
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-
            composer-${{ runner.os }}-
    
    # 4 Composer install
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
    
      - name: Warmup Symfony cache (test)
        run: php bin/console cache:warmup --env=test

    # 5 PHP CS Fixer
      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --ansi

    # 6 PHPStan
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.dist.neon --memory-limit=-1
    
    # 7 Migrations Doctrine
      - name: Prepare database (Doctrine)
        run: |
          php bin/console doctrine:migrations:migrate -n --env=test
          php bin/console doctrine:fixtures:load -n --purge-with-truncate --env=test
    
    # 8 Tests PHPUnit
      - name: PHPUnit
        run: vendor/bin/phpunit -c phpunit.xml.dist